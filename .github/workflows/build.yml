name: Build & Release Overdesk Checklist
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022        # ← FIXED: explicit x64 runner
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install System Dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --arch=x64   # ← FIXED: force x64 native binaries

      - name: Build Web Application (React/Vite)
        run: npm run build

      - name: Build Windows Executables (Electron Builder)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always   # ← FIXED: explicit arch

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Overdesk-Checklist-exe
          path: |
            dist-electron/*.exe
            dist-electron/*.yml
          if-no-files-found: warn
